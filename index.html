<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>songs</title>
  <style>
    :root {
      --bg:      #0d0d0d;
      --surface: #161616;
      --border:  #2a2a2a;
      --text:    #e8e8e8;
      --muted:   #666;
      --accent:  #c8a96e;
      --hover:   #1e1e1e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Georgia", "Times New Roman", serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4rem 1.5rem 6rem;
    }

    .container { width: 100%; max-width: 560px; }

    /* ── Header ── */
    header { margin-bottom: 3.5rem; }

    header h1 {
      font-size: 1.25rem;
      font-weight: normal;
      letter-spacing: 0.12em;
      text-transform: lowercase;
      color: var(--accent);
      margin-bottom: 1.2rem;
    }

    header p {
      font-size: 0.95rem;
      line-height: 1.7;
      color: var(--muted);
    }

    /* ── Song list ── */
    .songs { list-style: none; }

    .songs li {
      border-top: 1px solid var(--border);
    }

    .songs li:last-child {
      border-bottom: 1px solid var(--border);
    }

    .song-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.85rem 0.25rem;
      transition: background 0.15s;
      border-radius: 2px;
    }

    .song-row:hover { background: var(--hover); }

    .song-title-link {
      text-decoration: none;
      color: var(--text);
      font-size: 1rem;
      flex: 1;
      transition: color 0.15s;
    }

    .song-title-link:hover { color: var(--accent); }

    .song-actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-shrink: 0;
    }

    /* ── Icon button base ── */
    .icon-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 4px;
      text-decoration: none;
      position: relative;
      transition: opacity 0.15s, background 0.15s;
    }

    .icon-btn svg { display: block; }

    /* ── SoundCloud button ── */
    .sc-btn {
      background: #ff5500;
      color: #fff;
      gap: 4px;
      width: auto;
      padding: 0 10px;
    }

    .sc-btn:hover { opacity: 0.85; }

    /* ── Tooltip ── */
    .icon-btn::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: calc(100% + 6px);
      right: 0;
      background: #1a1a1a;
      color: #ccc;
      font-size: 0.7rem;
      font-family: sans-serif;
      padding: 0.3em 0.6em;
      border-radius: 3px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.15s, transform 0.15s;
      border: 1px solid #333;
    }

    .icon-btn:hover::after {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── Author ── */
    .author {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .author img {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      object-fit: cover;
      filter: grayscale(30%);
    }

    .author-name {
      font-size: 0.9rem;
      color: var(--muted);
    }

    /* ── Footer ── */
    footer {
      margin-top: 4rem;
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    footer a {
      color: var(--muted);
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    footer a:hover {
      color: var(--accent);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="author">
        <img src="images/author-photo.jpg" alt="Sergio Rykov" />
        <span class="author-name">Sergio Rykov</span>
      </div>
      <h1>songs</h1>
      <p>Indie songs — lyrics, chords, and lead sheets.<br>PDFs typeset with Typst.</p>
    </header>

    <ul class="songs">
      <li>
        <div class="song-row">
          <a class="song-title-link" href="pdf/Береги себя.pdf" target="_blank">Береги себя</a>
          <div class="song-actions">
            <a class="icon-btn sc-btn"
               href="https://soundcloud.com/sergiorykov/beregi-sebya"
               target="_blank" rel="noopener"
               data-tooltip="Listen on SoundCloud">
              <!-- Play icon -->
              <svg width="11" height="13" viewBox="0 0 11 13" fill="white">
                <polygon points="0,0 11,6.5 0,13"/>
              </svg>
              <!-- SoundCloud logo -->
              <svg width="22" height="11" viewBox="0 0 60 28" fill="white">
                <path d="M0 20q0-2 1.4-3.4Q2.8 15.2 5 15.2q.5 0 1 .1.3-3.4 2.8-5.6Q11.3 7.5 15 7.5q2.4 0 4.4 1.1 2 1.1 3.2 3 1-.4 2.1-.4 2.6 0 4.4 1.8 1.8 1.8 1.8 4.4 0 2.5-1.8 4.3Q27.3 23.5 24.7 23.5H5q-2.1 0-3.55-1.5Q0 20.5 0 20z"/>
              </svg>
            </a>
          </div>
        </div>
      </li>
    </ul>

    <footer>
      <a href="https://creativecommons.org/licenses/by/4.0/" target="_blank" rel="noopener">CC BY 4.0</a>
    </footer>
  </div>
</body>
</html>
